version: "3.8"

services:
  app:
    build:
      context: .
      target: deps
    image: ai-company-portfolio:dev
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
